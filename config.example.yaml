# 复制本文件为 config.yaml 后按需修改，程序默认读取当前目录下的 config.yaml
# （也可通过 -config 参数指定其他路径）。

# 截图与识别文本的输出根目录，会自动创建 images/ 与 texts/ 两个子目录。
output_dir: "./output"

# 截取哪个/哪些屏幕：
#   primary - 仅主屏（默认）
#   all     - 所有已连接的屏幕，每个屏幕单独截图并识别一次
#   0/1/2.. - 指定屏幕索引
monitor: "primary"

ocr:
  # OCR识别语言提示，传递给系统自带OCR引擎（Windows: Windows.Media.Ocr；macOS: Vision Framework）
  # zh-Hans为简体中文，en为英文。无需安装任何OCR引擎，直接使用操作系统内置能力
  languages: ["zh-Hans", "en"]

trigger:
  # 全局快捷键触发：按下按键后立即执行一次截图+识别
  hotkey:
    enabled: true
    # modifiers为空表示不需要按住任何修饰键，单独按key这一个键即可触发
    modifiers: []
    # "`"为Tab键上方、数字1左侧的波浪键（`~），也可以改成 "F9"、["ctrl","shift"]+"S" 等组合
    key: "`"

  # 定时触发：每隔固定时间自动执行一次截图+识别
  timer:
    enabled: false
    interval: "30m" # 支持 Go duration 格式，如 10s、5m、1h

# 日志文件路径，会记录每次触发的执行结果（同时会输出到标准输出）
log_file: "./logs/app.log"
